name: Backend CD

# CD = deliver. Runs on PUSH to main (i.e. after a PR has merged and CI passed).
# Builds the image, pushes it to GHCR tagged with the commit SHA, then bumps
# BACKEND_TAG in the deploy repo so Portainer (GitOps) redeploys the stack.
#
# Assumes branch protection requires the "Backend CI" checks to pass before a PR
# can merge, so we don't re-run tests here.
on:
  push:
    branches: [main]
    paths: ['alembic.ini', 'migrations/**', 'requirements.txt', '**.py', 'Dockerfile', 'docker-entrypoint.sh']
  workflow_dispatch:

env:
  IMAGE_NAME: taskapp-backend

jobs:
  build-and-push:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # required to push to GHCR with GITHUB_TOKEN
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute image tag (short commit SHA)
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Lowercase owner (GHCR requires lowercase)
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ steps.owner.outputs.owner }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-deploy-repo:
    name: Bump tag in deploy repo (GitOps)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout deploy repo
        uses: actions/checkout@v4
        with:
          # GITHUB_TOKEN can't push cross-repo, so use DEPLOY_REPO_TOKEN — a
          # PAT with contents:write on the deploy repo.
          # Add it under repo Settings -> Secrets and variables -> Actions.
          repository: onlydurodola/taskapp_deploy
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
      - name: Update BACKEND_TAG and push
        run: |
          NEW="${{ needs.build-and-push.outputs.image_tag }}"
          sed -i "s/^BACKEND_TAG=.*/BACKEND_TAG=${NEW}/" .env
          git config user.name  "taskapp-ci[bot]"
          git config user.email "taskapp-ci@users.noreply.github.com"
          git add .env
          git commit -m "deploy(backend): ${NEW}" || { echo "No tag change"; exit 0; }
          # Backend and frontend CD can race on this repo — rebase + retry.
          for i in 1 2 3; do
            git push && break
            echo "push rejected (concurrent deploy bump) — rebasing, attempt $i"
            git pull --rebase && sleep 2
          done
      - name: Trigger Portainer redeploy (webhook)
        env:
          WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          # Optional fast path: instant redeploy instead of waiting for the git
          # webhook on the deploy repo. No-op if the secret isn't set.
          if [ -n "$WEBHOOK" ]; then curl -fsS -X POST "$WEBHOOK" && echo "webhook fired"; else echo "PORTAINER_WEBHOOK_URL not set — relying on deploy-repo webhook"; fi
