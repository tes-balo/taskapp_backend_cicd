name: Backend CD

# CD = deliver. Runs on PUSH to main (i.e. after a PR has merged and CI passed).
# Builds the image, pushes it to GHCR tagged with the commit SHA, then bumps
# BACKEND_TAG in the deploy repo so Portainer (GitOps) redeploys the stack.
#
# Assumes branch protection requires the "Backend CI" checks to pass before a PR
# can merge, so we don't re-run tests here.
on:
  push:
    branches: [main]
    paths: ['alembic.ini', 'migrations/**', 'requirements.txt', '**.py', 'Dockerfile', 'docker-entrypoint.sh']
  workflow_dispatch:

env:
  IMAGE_NAME: taskapp-backend

jobs:
  build-and-push:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # required to push to GHCR with GITHUB_TOKEN
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute image tag (short commit SHA)
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Lowercase owner (GHCR requires lowercase)
        id: owner
        run: echo "owner=tes-balo" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ steps.owner.outputs.owner }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-deploy-repo:
    name: Bump tag in deploy repo (GitOps)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: tes-balo/capstone-phoenix
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}

      - name: Bump backend image tag in manifests
        run: |
          NEW="${{ needs.build-and-push.outputs.image_tag }}"
          sed -i "s|ghcr.io/ts-a-devops/taskapp-backend:.*|ghcr.io/ts-a-devops/taskapp-backend:${NEW}|" manifests/backend-deployment.yaml
          git config user.name  "taskapp-ci[bot]"
          git config user.email "taskapp-ci@users.noreply.github.com"
          git add manifests/backend-deployment.yaml
          git commit -m "deploy(backend): bump image tag to ${NEW}" || { echo "No tag change"; exit 0; }
          for i in 1 2 3; do
            git push && break
            echo "push rejected — rebasing, attempt $i"
            git pull --rebase && sleep 2
          done